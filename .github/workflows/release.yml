name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to build and upload to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-appstore-artifact:
    name: Build App Store Channel Artifact
    runs-on: macos-26

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
      SUBTITLES_CODESIGN_IDENTITY: "-"
      SUBTITLES_BUNDLE_IDENTIFIER: local.Subtitles.AppStore
      SUBTITLES_DISTRIBUTION_CHANNEL: appstore
      SUBTITLES_APP_NAME: One More Cap
      SUBTITLES_APP_BUNDLE_NAME: One More Cap-AppStore
      SUBTITLES_APP_EXECUTABLE_NAME: One More Cap

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}
          persist-credentials: false

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun swift --version

      - name: Prepare App Store artifact metadata
        run: |
          version="${RELEASE_TAG#v}"
          version="${version%%-*}"
          version="${version%%+*}"

          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or 1.2.3"
            exit 1
          fi

          echo "SUBTITLES_BUNDLE_SHORT_VERSION=$version" >>"$GITHUB_ENV"
          echo "SUBTITLES_BUNDLE_VERSION=${GITHUB_RUN_NUMBER}" >>"$GITHUB_ENV"

      - name: Package App Store channel zip
        id: package_appstore
        run: |
          safe_tag="${RELEASE_TAG//\//-}"
          app_path="$(
            env -u SUBTITLES_SPARKLE_FEED_URL -u SUBTITLES_SPARKLE_PUBLIC_ED_KEY \
            scripts/package-app.sh | tail -n 1
          )"
          asset_name="One More Cap-${safe_tag}-macOS-AppStore-channel.zip"
          asset_path="dist/${asset_name}"

          mkdir -p dist
          ditto -c -k --norsrc --keepParent "$app_path" "$asset_path"

          echo "asset_name=$asset_name" >>"$GITHUB_OUTPUT"
          echo "asset_path=$asset_path" >>"$GITHUB_OUTPUT"

      - name: Upload App Store channel workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_appstore.outputs.asset_name }}
          path: ${{ steps.package_appstore.outputs.asset_path }}
          if-no-files-found: error

  build-release:
    name: Build Release
    runs-on: macos-26

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
      SUBTITLES_CODESIGN_IDENTITY: "-"
      SUBTITLES_BUNDLE_IDENTIFIER: local.Subtitles
      SUBTITLES_DISTRIBUTION_CHANNEL: github
      SUBTITLES_APP_NAME: One More Cap
      SUBTITLES_APP_BUNDLE_NAME: One More Cap
      SUBTITLES_APP_EXECUTABLE_NAME: One More Cap
      SUBTITLES_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SUBTITLES_SPARKLE_PUBLIC_ED_KEY }}
      SUBTITLES_SPARKLE_PRIVATE_KEY: ${{ secrets.SUBTITLES_SPARKLE_PRIVATE_KEY }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}
          persist-credentials: false

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun swift --version

      - name: Prepare release metadata
        id: metadata
        run: |
          version="${RELEASE_TAG#v}"
          version="${version%%-*}"
          version="${version%%+*}"

          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or 1.2.3"
            exit 1
          fi

          echo "SUBTITLES_BUNDLE_SHORT_VERSION=$version" >>"$GITHUB_ENV"
          echo "SUBTITLES_BUNDLE_VERSION=${GITHUB_RUN_NUMBER}" >>"$GITHUB_ENV"

          if [[ -z "${SUBTITLES_SPARKLE_PUBLIC_ED_KEY:-}" ]]; then
            echo "::error::Release builds require SUBTITLES_SPARKLE_PUBLIC_ED_KEY secret"
            exit 1
          fi

          if [[ -z "${SUBTITLES_SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::error::Release builds require SUBTITLES_SPARKLE_PRIVATE_KEY secret"
            exit 1
          fi

          echo "SUBTITLES_SPARKLE_FEED_URL=https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" >>"$GITHUB_ENV"
          echo "sparkle_enabled=true" >>"$GITHUB_OUTPUT"

      - name: Run checks
        run: scripts/check.sh

      - name: Package app zip
        id: package
        run: |
          app_path="$(SUBTITLES_DISTRIBUTION_CHANNEL=github scripts/package-app.sh | tail -n 1)"
          safe_tag="${RELEASE_TAG//\//-}"
          asset_name="One More Cap-${safe_tag}-macOS.zip"
          asset_path="dist/${asset_name}"

          mkdir -p dist
          ditto -c -k --norsrc --keepParent "$app_path" "$asset_path"

          echo "asset_name=$asset_name" >>"$GITHUB_OUTPUT"
          echo "asset_path=$asset_path" >>"$GITHUB_OUTPUT"

      - name: Prepare Sparkle appcast
        id: sparkle
        if: ${{ steps.metadata.outputs.sparkle_enabled == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
        run: |
          notes_path="dist/release-notes.md"
          gh release view "$RELEASE_TAG" --json body --jq '.body // ""' >"$notes_path"

          appcast_path="$(
            SUBTITLES_SPARKLE_FULL_RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" \
              scripts/create-appcast.sh "$ASSET_PATH" "$notes_path" | tail -n 1
          )"

          echo "appcast_name=appcast.xml" >>"$GITHUB_OUTPUT"
          echo "appcast_path=$appcast_path" >>"$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

      - name: Upload Sparkle appcast workflow artifact
        if: ${{ steps.metadata.outputs.sparkle_enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: appcast.xml
          path: ${{ steps.sparkle.outputs.appcast_path }}
          if-no-files-found: error

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
          ASSET_NAME: ${{ steps.package.outputs.asset_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null
          if gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | grep -Fx "$ASSET_NAME"; then
            echo "::error::Release asset already exists: $ASSET_NAME"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "$ASSET_PATH"

      - name: Upload Sparkle appcast release asset
        if: ${{ steps.metadata.outputs.sparkle_enabled == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          APPCAST_PATH: ${{ steps.sparkle.outputs.appcast_path }}
          APPCAST_NAME: ${{ steps.sparkle.outputs.appcast_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null
          if gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | grep -Fx "$APPCAST_NAME"; then
            echo "::error::Release asset already exists: $APPCAST_NAME"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "$APPCAST_PATH"
